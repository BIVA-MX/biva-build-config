name: Release Java (Reusable)

on:
  workflow_call:
    inputs:
      sonar_project_key:
        required: true
        type: string

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────────────────────
  # Job 1: Build, Test & Sonar sobre main (con el PR ya mergeado)
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build, Test & Sonar
    runs-on: [self-hosted, linux, biva]

    steps:
      - name: Fix workspace permissions
        run: |
          docker run --rm \
            -v "/tmp/runner-work:/tmp/runner-work" \
            alpine sh -c "chown -R $(id -u):$(id -g) /tmp/runner-work 2>/dev/null || true"

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: /tmp/runner-work/.gradle
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle.properties') }}
          restore-keys: gradle-

      - name: Login to Nexus Docker Registry
        run: |
          echo "${{ secrets.NEXUS_PASSWORD }}" | \
            docker login host.docker.internal:8082 -u "${{ secrets.NEXUS_USER }}" --password-stdin

      - name: Build, Test & Sonar
        run: |
          mkdir -p /tmp/runner-work/.gradle
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --add-host=host.docker.internal:host-gateway \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "/tmp/runner-work/.gradle:/tmp/gradle-home" \
            -w /workspace \
            -e GRADLE_USER_HOME=/tmp/gradle-home \
            -e SONAR_TOKEN="${{ secrets.SONAR_TOKEN }}" \
            -e BIVA_NEXUS_USER="${{ secrets.NEXUS_USER }}" \
            -e BIVA_NEXUS_PASSWORD="${{ secrets.NEXUS_PASSWORD }}" \
            -e BIVA_LIBS_URL="http://192.168.3.35:8081/repository/biva-libs/" \
            host.docker.internal:8082/biva-java21-gradle85:latest \
            gradle clean build test \
              jacocoTestReport \
              jacocoTestCoverageVerification \
              sonar \
              -Dsonar.host.url=http://192.168.3.35:9000 \
              -Dsonar.projectKey="${{ inputs.sonar_project_key }}"

  # ─────────────────────────────────────────────────────────────
  # Job 2: Calcular nueva versión, actualizar gradle.properties,
  #         hacer commit y crear el tag git
  # ─────────────────────────────────────────────────────────────
  autoversion:
    name: Version Bump & Tag
    needs: build
    runs-on: [self-hosted, linux, biva]
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump version in gradle.properties
        id: bump
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          CURRENT=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [[ "$BRANCH" == major-* ]]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [[ "$BRANCH" == feature-* ]]; then
            MINOR=$((MINOR + 1)); PATCH=0
          elif [[ "$BRANCH" == fix-* ]]; then
            PATCH=$((PATCH + 1))
          else
            echo "Branch '$BRANCH' no coincide con fix-*, feature-* o major-* — sin release"
            echo "new_version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          sed -i "s/^version=.*/version=${NEW_VERSION}/" gradle.properties
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Versión: ${CURRENT} → ${NEW_VERSION}"

      - name: Commit & push tag
        if: steps.bump.outputs.new_version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: release ${{ steps.bump.outputs.new_version }}"
          git tag ${{ steps.bump.outputs.new_version }}
          git push origin main
          git push origin ${{ steps.bump.outputs.new_version }}

  # ─────────────────────────────────────────────────────────────
  # Job 3: Release — createTar (application) o publish (library)
  #         Hace checkout DESPUÉS del commit de autoversion
  #         para que gradle.properties tenga la versión actualizada
  # ─────────────────────────────────────────────────────────────
  release:
    name: Release
    needs: autoversion
    if: needs.autoversion.outputs.new_version != ''
    runs-on: [self-hosted, linux, biva]

    steps:
      - name: Fix workspace permissions
        run: |
          docker run --rm \
            -v "/tmp/runner-work:/tmp/runner-work" \
            alpine sh -c "chown -R $(id -u):$(id -g) /tmp/runner-work 2>/dev/null || true"

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: /tmp/runner-work/.gradle
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle.properties') }}
          restore-keys: gradle-

      - name: Login to Nexus Docker Registry
        run: |
          echo "${{ secrets.NEXUS_PASSWORD }}" | \
            docker login host.docker.internal:8082 -u "${{ secrets.NEXUS_USER }}" --password-stdin

      - name: Read projectType
        id: meta
        run: |
          PROJECT_TYPE=$(grep '^projectType=' gradle.properties | cut -d'=' -f2)
          echo "project_type=${PROJECT_TYPE}" >> $GITHUB_OUTPUT
          echo "Tipo de proyecto: ${PROJECT_TYPE}"

      # ── Application: genera el .tgz deployable ─────────────────
      - name: Create Tar
        if: steps.meta.outputs.project_type == 'application'
        run: |
          mkdir -p /tmp/runner-work/.gradle
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --add-host=host.docker.internal:host-gateway \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "/tmp/runner-work/.gradle:/tmp/gradle-home" \
            -w /workspace \
            -e GRADLE_USER_HOME=/tmp/gradle-home \
            -e BIVA_NEXUS_USER="${{ secrets.NEXUS_USER }}" \
            -e BIVA_NEXUS_PASSWORD="${{ secrets.NEXUS_PASSWORD }}" \
            -e BIVA_LIBS_URL="http://192.168.3.35:8081/repository/biva-libs/" \
            host.docker.internal:8082/biva-java21-gradle85:latest \
            gradle clean compileJava createTar

      - name: Upload Tar as workflow artifact
        if: steps.meta.outputs.project_type == 'application'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ needs.autoversion.outputs.new_version }}
          path: build/*.tgz
          retention-days: 30

      # ── Library: publica el JAR a Nexus ─────────────────────────
      - name: Publish to Nexus
        if: steps.meta.outputs.project_type == 'library'
        run: |
          mkdir -p /tmp/runner-work/.gradle
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --add-host=host.docker.internal:host-gateway \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "/tmp/runner-work/.gradle:/tmp/gradle-home" \
            -w /workspace \
            -e GRADLE_USER_HOME=/tmp/gradle-home \
            -e BIVA_NEXUS_USER="${{ secrets.NEXUS_USER }}" \
            -e BIVA_NEXUS_PASSWORD="${{ secrets.NEXUS_PASSWORD }}" \
            -e BIVA_LIBS_URL="http://192.168.3.35:8081/repository/biva-libs/" \
            -e BIVA_NEXUS_PUBLISHER_USER="${{ secrets.NEXUS_PUBLISHER_USER }}" \
            -e BIVA_NEXUS_PUBLISHER_PASSWORD="${{ secrets.NEXUS_PUBLISHER_PASSWORD }}" \
            -e BIVA_LIBS_PUBLISH_URL="http://192.168.3.35:8081/repository/biva-libs/" \
            host.docker.internal:8082/biva-java21-gradle85:latest \
            gradle publish
