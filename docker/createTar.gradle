import org.apache.tools.ant.filters.ReplaceTokens

def getSystemProperty(propertyName, elseValue ){
    String propStr = System.getProperty(propertyName)
    if( propStr != null  ){
        return propStr
    }
    return elseValue
}

def loadConfiguration() {
  def profileName = getSystemProperty("app", "app")
  def configFileName = "$profileName"
  try {
    def configFile = file('config/' + "$configFileName" + '.groovy')
    def config = new ConfigSlurper("conf").parse(configFile.toURI().toURL())
    System.properties.put('config', config)
    return config
  } catch (Exception e) {def configFile = file('config' + "$configFileName" + '.groovy')
    throw new InvalidUserDataException("No se ha encontrado las propiedades para la configuracion del proyecto", e)
  }
  
}

processResources {
  def conf = loadConfiguration()
  if (conf != null) {
    def properties = conf.flatten()
    def profileName = getSystemProperty("app", "app")
    project.ext.set('version', version)
    project.ext.set('appIncludeDataFiles', 'false')
    System.setProperty('appIncludeDataFiles', 'false')
    project.properties.each {k, v ->
      if (k != null && v != null) {
        if (v != null && v instanceof java.lang.String) {
			properties.put(k, v)        
        }
      }
    }
        filesMatching(["**/*.yml", "**/*.yaml", "**/bin/*.sh", "**/docker/Dockerfile", "**/launcher/launcher.sh"]) {
        filter(ReplaceTokens, tokens: properties)
    }
    
  } else {
    throw new InvalidUserDataException("No se ha encontrado las propiedades para la configuracion del proyecto")
  }
}

def downloadBaseLauncher() {
    download.run {
        src([
            'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker/scripts/bin/cleanLogs.sh',
            'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker/scripts/bin/createDockerContainer.sh',
            'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker/scripts/bin/createDockerImage.sh',
            'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker/scripts/bin/createDockerInstance.sh',
            'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker/scripts/bin/removeDockerInstance.sh',
            'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker/scripts/bin/remove.sh',
            'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker/scripts/bin/setEnv.sh',
            'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker/scripts/bin/shutdown.sh',
            'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker/scripts/bin/start.sh',
            'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker/scripts/bin/status.sh'
        ])
        dest "${buildDir}/resources/main/bin"
    }
    copyLauncherBase.copy()
}

def downloadDockerfile() {
    download.run {
        src 'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker/scripts/docker/Dockerfile'
        dest "${buildDir}/resources/main/docker/Dockerfile"
    }
    copyDockerFileDownloaded.copy()
}

def downloadLauncher() {
    download.run {
        src 'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker/scripts/launcher/launcher.sh'
        dest "${buildDir}/resources/main/launcher/launcher.sh"
    }
    copyLaunchers.copy()
}

task copyDockerFileDownloaded(type: Copy) {
    from "${buildDir}/resources/main/docker"
    into "${buildDir}/deploy/${version}/docker"
    def conf = loadConfiguration()
    def properties = conf.flatten()
    def profileName = getSystemProperty("app", "app")
    project.ext.set('version', version)
    project.ext.set('appIncludeDataFiles', 'false')
    System.setProperty('appIncludeDataFiles', 'false')
    project.properties.each {k, v ->
      if (k != null && v != null) {
        if (v != null && v instanceof java.lang.String) {
			properties.put(k, v)
        }
      }
    }
    // Gradle 9 removio archivesBaseName del project.properties iterable.
    // El Dockerfile usa @archivesBaseName@ para construir el nombre del JAR,
    // asi que hay que inyectarlo explicitamente desde base.archivesName.
    if (GradleVersion.current() >= GradleVersion.version("8.4")) {
        properties.put('archivesBaseName', base.archivesName.get())
    }
    filter(ReplaceTokens, tokens: properties)
}

task copyLauncherBase(type:Copy) {
    from "${buildDir}/resources/main/bin"
    into "${buildDir}/deploy/${version}/bin"
    if (GradleVersion.current() >= GradleVersion.version("8.3")) {
      filePermissions { unix(0755) }
    } else {
      fileMode = 0755
    }
    def conf = loadConfiguration()
    def properties = conf.flatten()
    def profileName = getSystemProperty("app", "app")
    project.ext.set('version', version)
    project.ext.set('appIncludeDataFiles', 'false')
    System.setProperty('appIncludeDataFiles', 'false')
    project.properties.each {k, v ->
      if (k != null && v != null) {
        if (v != null && v instanceof java.lang.String) {
			properties.put(k, v)        
        }
      }
    }
    filter(ReplaceTokens, tokens: properties)
}

task copyLaunchers(type:Copy) {
    from "${buildDir}/resources/main/launcher"
