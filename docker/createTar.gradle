task explodeJar(type: Copy) {
    // Gradle 9 removio el property project.archivesBaseName.
    // Usar base.archivesName.get() es compatible con Gradle 7.0+ (incluye 8.x y 9.x).
    def baseName = (GradleVersion.current() >= GradleVersion.version("8.4")) ? base.archivesName.get() : project.archivesBaseName
    def jarFile = file("${buildDir}/libs/${baseName}-${version}.jar")
    def outputDir = file("${buildDir}/deploy/${version}/docker")

    from jarFile
    into outputDir
}

task tarDistFile(type: Tar) {
    from "${buildDir}/deploy/"
    archiveBaseName = project.name
    compression Compression.GZIP
    destinationDirectory = "${buildDir}" as File

    // Tar usa sus propios defaults (0644 archivos, 0755 dirs) y no hereda los
    // permisos del filesystem. Marcar los .sh como ejecutables para que al
    // descomprimir el TAR en el servidor se puedan correr sin chmod manual.
    eachFile { details ->
        if (details.name.endsWith('.sh')) {
            if (GradleVersion.current() >= GradleVersion.version("8.3")) {
                details.permissions { unix(0755) }
            } else {
                details.mode = 0755
            }
        }
    }
}


task createTar(dependsOn:bootJar) {
    doLast {
        downloadDockerfile()
        explodeJar.copy()
        downloadBaseLauncher()
        downloadLauncher()
        tarDistFile.copy()
    }
}