import org.apache.tools.ant.filters.ReplaceTokens

def getSystemProperty(propertyName, elseValue ){
    String propStr = System.getProperty(propertyName)
    if( propStr != null  ){
        return propStr
    }
    return elseValue
}

def loadConfiguration() {
  def profileName = getSystemProperty("app", "app")
  def configFileName = "$profileName"
  try {
    def configFile = file('config/' + "$configFileName" + '.groovy')
    def config = new ConfigSlurper("conf").parse(configFile.toURI().toURL())
    System.properties.put('config', config)
    return config
  } catch (Exception e) {def configFile = file('config' + "$configFileName" + '.groovy')
    throw new InvalidUserDataException("No se ha encontrado las propiedades para la configuracion del proyecto", e)
  }
  
}

processResources {
  def conf = loadConfiguration()
  if (conf != null) {
    def properties = conf.flatten()
    def profileName = getSystemProperty("app", "app")
    project.ext.set('version', version)
    project.ext.set('appIncludeDataFiles', 'false')
    System.setProperty('appIncludeDataFiles', 'false')
    project.properties.each {k, v ->
      if (k != null && v != null) {
        if (v != null && v instanceof java.lang.String) {
			properties.put(k, v)        
        }
      }
    }
        filesMatching(["**/*.yml", "**/*.yaml", "**/bin/*.sh", "**/docker/Dockerfile", "**/launcher/launcher.sh"]) {
        filter(ReplaceTokens, tokens: properties)
    }
    
  } else {
    throw new InvalidUserDataException("No se ha encontrado las propiedades para la configuracion del proyecto")
  }
}

def downloadBaseLauncher() {
    download.run {
        src([
            'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker_compose/scripts/bin/createDockerImage.sh',
            'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker_compose/scripts/bin/removeDockerImage.sh',
            'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker_compose/scripts/bin/createImageZip.sh'
        ])
        dest "${buildDir}/resources/main/bin"
    }
    copyLauncherBase.copy()
}

def downloadDockerfile() {
    download.run {
        src 'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker_compose/scripts/docker/Dockerfile'
        dest "${buildDir}/resources/main/docker/Dockerfile"
    }
    copyDockerFileDownloaded.copy()
}

def downloadLauncher() {
    download.run {
        src 'https://raw.githubusercontent.com/BIVA-MX/biva-build-config/main/docker_compose/scripts/launcher/launcher.sh'
        dest "${buildDir}/resources/main/launcher/launcher.sh"
    }
    copyLaunchers.copy()
}

task copyDockerFileDownloaded(type: Copy) {
    from "${buildDir}/resources/main/docker"
    into "${buildDir}/deploy/${version}/docker"
    def conf = loadConfiguration()
    def properties = conf.flatten()
    def profileName = getSystemProperty("app", "app")
    project.ext.set('version', version)
    project.ext.set('appIncludeDataFiles', 'false')
    System.setProperty('appIncludeDataFiles', 'false')
    project.properties.each {k, v ->
      if (k != null && v != null) {
        if (v != null && v instanceof java.lang.String) {
			properties.put(k, v)        
        }
      }
    }
    filter(ReplaceTokens, tokens: properties)
}

task copyLauncherBase(type:Copy) {
    from "${buildDir}/resources/main/bin"
    into "${buildDir}/deploy/${version}/bin"
    fileMode = 0755
    def conf = loadConfiguration()
    def properties = conf.flatten()
    def profileName = getSystemProperty("app", "app")
    project.ext.set('version', version)
    project.ext.set('appIncludeDataFiles', 'false')
