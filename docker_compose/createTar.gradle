task explodeJar(type: Copy) {
    def jarFile = file("${buildDir}/libs/${archivesBaseName}-${version}.jar")
    def outputDir = file("${buildDir}/deploy/${version}/docker")

    from jarFile
    into outputDir
}

task tarDistFile(type: Tar) {
    from "${buildDir}/deploy/"
    archiveBaseName = project.name
    compression Compression.GZIP
    destinationDirectory = "${buildDir}" as File
}


task createTar(dependsOn:bootJar) {
    doLast {
        downloadDockerfile()
        explodeJar.copy()
        downloadBaseLauncher()
        downloadLauncher()
        tarDistFile.copy()
    }
}